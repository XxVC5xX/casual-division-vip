*{margin:0;padding:0;box-sizing:border-box}
:root{--black:#0a0a0a;--white:#f5f3ef;--gold:#c9a84c;--gold-dark:#8a6f2e;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;--muted:#666;--red:#e24b4a}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
header{padding:1.25rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--black);position:sticky;top:0;z-index:1000}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:0.05em}
.logo span{color:var(--gold)}
.logo-sub{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-top:-4px}
.discord-badge{display:inline-flex;align-items:center;gap:0.5rem;background:var(--surface2);border:1px solid var(--border);padding:0.4rem 1rem;border-radius:2px;font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:border-color 0.2s,color 0.2s}
.discord-badge:hover{border-color:var(--gold);color:var(--gold)}
.discord-dot{width:8px;height:8px;background:#5865F2;border-radius:50%}
.header-right{text-align:right}
.counter-label{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.counter{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--gold);line-height:1}
.layout{display:grid;grid-template-columns:280px 1fr 240px;height:calc(100vh - 72px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.form-section{padding:1.25rem;border-bottom:1px solid var(--border)}
.form-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.12em;color:var(--gold);margin-bottom:1rem}
.form-group{margin-bottom:0.85rem;position:relative}
.form-group label{display:block;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:0.35rem}
.form-group input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--white);padding:0.55rem 0.75rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;outline:none;border-radius:2px;transition:border-color 0.2s}
.form-group input:focus{border-color:var(--gold)}
.form-group input::placeholder{color:var(--muted)}
.btn-add{width:100%;padding:0.7rem;background:var(--gold);color:var(--black);border:none;font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:0.15em;cursor:pointer;border-radius:2px;transition:background 0.2s,transform 0.1s}
.btn-add:hover{background:#e8c06a}
.btn-add:active{transform:scale(0.98)}
.btn-add:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.members-section{flex:1;overflow-y:auto;padding:1rem 1.25rem}
.section-label{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:0.75rem}
.member-item{display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0;border-bottom:1px solid var(--border)}
.member-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0}
.member-info{flex:1;min-width:0}
.member-pseudo{font-size:0.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-location{font-size:0.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.75rem;padding:0.2rem 0.4rem;display:none;transition:color 0.15s;flex-shrink:0}
.btn-del:hover{color:var(--red)}
body.admin-mode .btn-del{display:block}
#map{z-index:1}
.right-panel{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.clubs-section{padding:1.25rem;flex:1;overflow-y:auto}
.clubs-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.12em;color:var(--gold);margin-bottom:1rem}
.club-item{display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0;border-bottom:1px solid var(--border)}
.club-rank{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;color:var(--muted);width:18px;text-align:center;flex-shrink:0}
.club-rank.top1{color:var(--gold)}
.club-rank.top2{color:#aaa}
.club-rank.top3{color:#cd7f32}
.club-name{flex:1;font-size:0.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.club-count{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;color:var(--gold);flex-shrink:0}
.club-logo{width:22px;height:22px;object-fit:contain;flex-shrink:0}
.club-logo-placeholder{width:22px;height:22px;background:var(--surface2);border:1px solid var(--border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:0.55rem;color:var(--muted)}
.casual-strip{padding:0.85rem 1.25rem;border-top:1px solid var(--border);font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);line-height:1.8}
.casual-strip a{color:var(--gold);text-decoration:none}
.search-results{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-top:none;z-index:100;max-height:160px;overflow-y:auto}
.search-result-item{padding:0.45rem 0.75rem;font-size:0.8rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s}
.search-result-item:hover{background:var(--surface2);color:var(--gold)}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface);border:1px solid var(--gold);color:var(--white);padding:0.6rem 1rem;font-size:0.82rem;border-radius:2px;z-index:9999;opacity:0;transform:translateY(8px);transition:all 0.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.empty-state{text-align:center;padding:2rem 0.5rem;color:var(--muted);font-size:0.78rem;line-height:1.7}
.admin-btn{position:fixed;bottom:2rem;left:2rem;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:0.4rem 0.8rem;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;z-index:9999;transition:all 0.2s}
.admin-btn:hover{border-color:var(--gold);color:var(--gold)}
body.admin-mode .admin-btn{border-color:var(--red);color:var(--red)}
.loading-bar{height:2px;background:var(--gold);width:0;transition:width 0.3s;position:fixed;top:0;left:0;z-index:9999}
.leaflet-container{background:#0d0d0d}
.leaflet-popup-content-wrapper{background:var(--surface);border:1px solid var(--border);border-radius:3px;color:var(--white);box-shadow:0 8px 24px rgba(0,0,0,0.7)}
.leaflet-popup-tip{background:var(--surface)}
.leaflet-popup-content{margin:10px 14px;font-family:'DM Sans',sans-serif}
.popup-pseudo{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.05em;color:var(--gold)}
.popup-city{font-size:0.75rem;color:var(--muted);margin-top:2px}
.popup-club{font-size:0.8rem;margin-top:5px;padding-top:5px;border-top:1px solid var(--border)}
@media(max-width:900px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto 1fr auto;height:auto}
  .sidebar{border-right:none;border-bottom:1px solid var(--border)}
  .right-panel{border-left:none;border-top:1px solid var(--border);flex-direction:row;flex-wrap:wrap}
  .clubs-section{flex:1;min-width:200px}
  .casual-strip{width:100%;border-top:1px solid var(--border)}
  #map{height:55vh;min-height:300px}
  header{padding:0.85rem 1rem}
  .logo{font-size:1.4rem}
  .counter{font-size:1.4rem}
  .discord-badge{display:none}
  .members-section{max-height:200px}

@media(max-width:600px){
  #map{height:45vh;min-height:250px}
  .right-panel{flex-direction:column}
  .clubs-section{max-height:180px;overflow-y:auto}
  .admin-btn{bottom:1rem;left:1rem}
  .toast{bottom:1rem;right:1rem;left:1rem;text-align:center}
}
</style>
</head>

<script>
const GITHUB_TOKEN='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';
const GITHUB_REPO='XxVC5xX/casual-division-vip';
const DATA_FILE='map-data.json';
const ADMIN_CODE='VC5';

let members=[];
let map,clusterGroup,selectedCity=null,searchTimeout=null,isAdmin=false,fileSha=null;

function setLoading(v){document.getElementById('loading-bar').style.width=v?'70%':'0'}

async function loadData(){
  setLoading(true);
  try{
    const r=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${DATA_FILE}`,{
      headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json'}
    });
    if(r.status===404){members=[];fileSha=null;}
    else{
      const d=await r.json();
      fileSha=d.sha;
      members=JSON.parse(atob(d.content.replace(/\n/g,'')));
    }
  }catch(e){members=[];}
  setLoading(false);
  renderAll();
}

async function saveData(){
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(members))));
  const body={message:'Update casual map',content};
  if(fileSha)body.sha=fileSha;
  const r=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${DATA_FILE}`,{
    method:'PUT',
    headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  const d=await r.json();
  if(d.content)fileSha=d.content.sha;
}

function initMap(){
  map=L.map('map',{center:[48.5,10],zoom:5,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);
  clusterGroup=L.markerClusterGroup({
    iconCreateFunction:function(c){
      return L.divIcon({html:'<div style="background:#c9a84c;color:#0a0a0a;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Bebas Neue,sans-serif;font-size:0.95rem;border:2px solid #8a6f2e">'+c.getChildCount()+'</div>',iconSize:[34,34],className:''});
    },maxClusterRadius:60
  });
  map.addLayer(clusterGroup);
  loadData();
}

const goldIcon=L.divIcon({html:'<div style="width:12px;height:12px;background:#c9a84c;border-radius:50%;border:2px solid #8a6f2e"></div>',iconSize:[12,12],iconAnchor:[6,6],className:''});

function renderAll(){
  clusterGroup.clearLayers();
  document.getElementById('total-counter').textContent=members.length;
  document.getElementById('member-count').textContent=members.length;
  const list=document.getElementById('members-list');
  if(!members.length){list.innerHTML='<div class="empty-state">Aucun membre encore.<br>Sois le premier !</div>';}
  else{list.innerHTML=members.map((m,i)=>`<div class="member-item"><div class="member-dot"></div><div class="member-info"><div class="member-pseudo">${esc(m.pseudo)}</div><div class="member-location">${esc(m.city)}${m.club?' · '+esc(m.club):''}</div></div><button class="btn-del" onclick="deleteMember(${i})">✕</button></div>`).join('');}
  members.forEach(m=>{
    const mk=L.marker([m.lat,m.lng],{icon:goldIcon});
    mk.bindPopup(`<div class="popup-pseudo">${esc(m.pseudo)}</div><div class="popup-city">${esc(m.city)}</div>${m.club?'<div class="popup-club">⚽ '+esc(m.club)+'</div>':''}`);
    clusterGroup.addLayer(mk);
  });
  renderClubs();
}

function renderClubs(){
  const counts={};
  members.forEach(m=>{if(m.club){const k=m.club.trim();counts[k]=(counts[k]||0)+1;}});
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const cl=document.getElementById('clubs-list');
  if(!sorted.length){cl.innerHTML='<div class="empty-state">Aucun club<br>pour l\'instant</div>';return;}
  cl.innerHTML=sorted.map(([name,count],i)=>{
    const logo=getClubLogo(name);
    const initials=name.split(' ').filter(w=>w.length>2).map(w=>w[0].toUpperCase()).slice(0,2).join('')||name.slice(0,2).toUpperCase();
    const logoHtml=logo?`<img class="club-logo" src="${logo}" alt="" onerror="this.outerHTML='<div class=\\"club-logo-placeholder\\">${initials}</div>'">`:`<div class="club-logo-placeholder">${initials}</div>`;
    return `<div class="club-item">${logoHtml}<div class="club-rank ${i===0?'top1':i===1?'top2':i===2?'top3':''}">${i+1}</div><div class="club-name">${esc(name)}</div><div class="club-count">${count}</div></div>`;
  }).join('');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function toast(msg,err){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.borderColor=err?'#e24b4a':'#c9a84c';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);
}

async function addMember(){
  const pseudo=document.getElementById('input-pseudo').value.trim();
  const club=document.getElementById('input-club').value.trim();
  if(!pseudo){toast('Entre ton pseudo Discord',true);return;}
  if(!selectedCity){toast('Sélectionne une ville dans la liste',true);return;}
  const btn=document.getElementById('btn-add');
  btn.disabled=true;btn.textContent='ENREGISTREMENT...';
  try{
    await loadData();
    const idx=members.findIndex(m=>m.pseudo.toLowerCase()===pseudo.toLowerCase());
    const entry={pseudo,city:selectedCity.name,lat:selectedCity.lat,lng:selectedCity.lng,club:club||''};
    if(idx>=0){members[idx]=entry;}else{members.push(entry);}
    await saveData();
    renderAll();
    document.getElementById('input-pseudo').value='';
    document.getElementById('input-city').value='';
    document.getElementById('input-club').value='';
    selectedCity=null;
    toast(idx>=0?'Marqueur mis à jour !':'Bienvenue sur la Casual Map ! 🍋');
    map.flyTo([entry.lat,entry.lng],8,{duration:1.5});
  }catch(e){toast('Erreur — réessaie',true);}
  btn.disabled=false;btn.textContent='AJOUTER MON MARQUEUR';
}

async function deleteMember(i){
  if(!isAdmin)return;
  members.splice(i,1);
  await saveData();
  renderAll();
  toast('Marqueur supprimé');
}

function toggleAdmin(){
  if(isAdmin){isAdmin=false;document.body.classList.remove('admin-mode');toast('Mode admin désactivé');return;}
  const code=prompt('Code admin :');
  if(code===ADMIN_CODE){isAdmin=true;document.body.classList.add('admin-mode');toast('Mode admin activé');}
  else if(code!==null){toast('Code incorrect',true);}
}

async function searchCity(q){
  if(q.length<2){document.getElementById('city-results').style.display='none';return;}
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=6&accept-language=fr`);
    const data=await r.json();
    const el=document.getElementById('city-results');
    if(!data.length){el.style.display='none';return;}
    el.style.display='block';
    el.innerHTML=data.map(d=>{
      const name=d.display_name.split(',').slice(0,2).join(',').trim();
      return `<div class="search-result-item" onclick="selectCity('${name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}',${d.lat},${d.lon})">${name}</div>`;
    }).join('');
  }catch(e){}
}

function selectCity(name,lat,lng){
  selectedCity={name,lat:parseFloat(lat),lng:parseFloat(lng)};
  document.getElementById('input-city').value=name;
  document.getElementById('city-results').style.display='none';
}

document.getElementById('input-city').addEventListener('input',function(){clearTimeout(searchTimeout);searchTimeout=setTimeout(()=>searchCity(this.value),350);});
document.addEventListener('click',e=>{if(!e.target.closest('.form-group'))document.getElementById('city-results').style.display='none';});
document.getElementById('input-club').addEventListener('keypress',e=>{if(e.key==='Enter')addMember();});
document.getElementById('input-pseudo').addEventListener('keypress',e=>{if(e.key==='Enter')addMember();});

initMap();
